name: Frontend Test

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_call:

jobs:
  test:
    name: Test frontend
    runs-on: ubuntu-latest

    env:
      VITE_API_BASE_URL: ''
      VITE_CDN_BASE_URL: ''
      VITE_PAYSTACK_PUBLIC_KEY: ''
      VITE_ANALYTICS_ID: ''

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test
