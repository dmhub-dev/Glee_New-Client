name: Deploy Frontend

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: frontend-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint frontend
    uses: ./.github/workflows/lint.yml

  test:
    name: Test frontend
    uses: ./.github/workflows/test.yml

  build:
    name: Build frontend
    runs-on: ubuntu-latest
    needs:
      - lint
      - test

    env:
      VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
      VITE_CDN_BASE_URL: ${{ secrets.VITE_CDN_BASE_URL }}
      VITE_PAYSTACK_PUBLIC_KEY: ${{ secrets.VITE_PAYSTACK_PUBLIC_KEY }}
      VITE_ANALYTICS_ID: ${{ secrets.VITE_ANALYTICS_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm build

      - name: Verify build output
        run: test -f dist/index.html

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build
    environment: production

    env:
      VPS_POST_DEPLOY_COMMAND: ${{ secrets.VPS_POST_DEPLOY_COMMAND }}

    steps:
      - name: Check deployment secrets
        id: deploy_config
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_APP_PATH: ${{ secrets.VPS_APP_PATH }}
          VPS_DEPLOY_PATH: ${{ secrets.VPS_DEPLOY_PATH }}
        run: |
          APP_PATH="${VPS_APP_PATH:-$VPS_DEPLOY_PATH}"
          if [ -z "$VPS_HOST" ] || [ -z "$VPS_USER" ] || [ -z "$VPS_SSH_KEY" ] || [ -z "$APP_PATH" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Missing VPS deployment secrets. Skipping deploy."
            exit 0
          fi
          echo "ready=true" >> "$GITHUB_OUTPUT"
          echo "app_path=$APP_PATH" >> "$GITHUB_OUTPUT"

      - name: Configure SSH
        if: steps.deploy_config.outputs.ready == 'true'
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -T 30 -p "${VPS_PORT:-22}" -H "$VPS_HOST" >> ~/.ssh/known_hosts || true

      - name: Rebuild frontend container
        if: steps.deploy_config.outputs.ready == 'true'
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_APP_PATH: ${{ steps.deploy_config.outputs.app_path }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new -p "${VPS_PORT:-22}" "$VPS_USER@$VPS_HOST" "cd '$VPS_APP_PATH' && git pull --ff-only && docker compose --env-file .env up -d --build"

      - name: Run post-deploy command
        if: steps.deploy_config.outputs.ready == 'true' && env.VPS_POST_DEPLOY_COMMAND != ''
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new -p "${VPS_PORT:-22}" "$VPS_USER@$VPS_HOST" "$VPS_POST_DEPLOY_COMMAND"
